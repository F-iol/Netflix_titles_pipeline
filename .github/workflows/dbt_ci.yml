name: dbt CI pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
    run_dbt_jobs:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.10'

        - name: Install dbt
          run: |
                pip install --upgrade pip
                pip install dbt-core dbt-duckdb
        
        - name: Run dbt build
          run: dbt build --profiles-dir . --target dev